# Codex Gateway 配置参考
# 文件: ~/.codex/config.toml (用户级) 或 <project>/.codex/config.toml (项目级)
# Gateway spawn codex exec 时可通过 -c key=value 覆盖任意配置

# ---- MCP Servers (Codex 直接调用 Slack 工具) --------------------------------
[mcp_servers.chorusgate]
command = "chorusgate-mcp"
env_vars = [
    "SLACK_BOT_TOKEN",
    "SLACK_APP_TOKEN",
]

[mcp_servers.chorusgate.env]
MCP_SENDER_ONLY = "1"

# ---- 审批模式 (headless 下用 --dangerously-bypass-approvals-and-sandbox 替代) ----
# [approvals]
# mode = "never"              # never | on-request | untrusted

# ---- 模型选择 ----------------------------------------------------------------
# [model]
# provider = "openai"         # 模型 provider
# name = "gpt-5"              # 模型名

# ---- 迭代限制 (CLI 参数 -c max_iterations=N 可覆盖) --------------------------
# [agent]
# max_iterations = 10         # 单个 turn 最大迭代次数
# sandbox_mode = "workspace-write"

# ---- Web 搜索 (CLI 参数 --search 可启用) -------------------------------------
# [tools]
# web_search = true

# ---- Shell 环境策略 ----------------------------------------------------------
# [shell_environment_policy]
# inherit = "all"             # all | none | selective
