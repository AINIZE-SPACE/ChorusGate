[mcp_servers.chorusgate]
command = "chorusgate-mcp"
env_vars = [
    "SLACK_BOT_TOKEN",
    "SLACK_APP_TOKEN",
]

[mcp_servers.chorusgate.env]
MCP_SENDER_ONLY = "1"

[mcp_servers.trello]
command = "npx"
args = [
    "-y",
    "trello-mcp-server@2.2.3",
]
env_vars = [
    "TRELLO_API_KEY",
    "TRELLO_TOKEN",
]
